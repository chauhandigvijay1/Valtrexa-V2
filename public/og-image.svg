<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#8b5cf6" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>
  <!-- Decorative circles -->
  <circle cx="150" cy="500" r="250" fill="#8b5cf6" opacity="0.08"/>
  <circle cx="1050" cy="150" r="300" fill="#a855f7" opacity="0.06"/>
  <circle cx="600" cy="315" r="400" fill="#7c3aed" opacity="0.04"/>
  <!-- Brand mark VX -->
  <text x="120" y="240" font-family="system-ui, sans-serif" font-size="160" font-weight="900" fill="url(#accent)" filter="url(#glow)">VX</text>
  <!-- Tagline -->
  <text x="120" y="320" font-family="system-ui, sans-serif" font-size="40" font-weight="300" fill="#c4b5fd">Valtrexa Career Compass</text>
  <!-- Divider line -->
  <rect x="120" y="350" width="80" height="4" rx="2" fill="url(#accent)"/>
  <!-- Description -->
  <text x="120" y="400" font-family="system-ui, sans-serif" font-size="24" font-weight="300" fill="#a78bfa">AI-powered job discovery &amp; auto-apply platform</text>
  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#8b5cf6" opacity="0.15"/>
  <text x="120" y="608" font-family="system-ui, sans-serif" font-size="18" font-weight="400" fill="#8b5cf6">valtrexa.com</text>
</svg>
